    <style>
        .filter-section { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 15px; }
        .filter-row input, .filter-row select { padding: 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--card); color: var(--text); }
        .price-slider { width: 200px; }
        .sort-buttons { display: flex; gap: 10px; }
        .sort-btn { background: var(--btn); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .rating { color: #ffc107; font-size: 14px; }
        .stops-list { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 8px; font-size: 14px; display: none; }
        .stop-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; margin: 5px 0; background: rgba(0,102,204,0.1); border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .stop-item:hover { background: rgba(0,102,204,0.2); transform: translateX(5px); }
        .route-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .toggle-stops { background: none; padding: 5px 10px; font-size: 12px; }
        @media (max-width: 768px) { .filter-row { flex-direction: column; align-items: stretch; } .price-slider { width: 100%; } }
    </style>

        let currentSort = 'price';
        let currentRoutes = [...routes];
        let reviews = JSON.parse(localStorage.getItem('railway_reviews') || '[]');

        function saveRating(routeId, rating) {
            let ratings = JSON.parse(localStorage.getItem('route_ratings') || '{}');
            ratings[routeId] = rating;
            localStorage.setItem('route_ratings', JSON.stringify(ratings));
            updateRouteRating(routeId);
        }

        function updateRouteRating(routeId) {
            const ratings = JSON.parse(localStorage.getItem('route_ratings') || '{}');
            const routeRatings = Object.entries(ratings).filter(([id]) => parseInt(id) === routeId).map(([,r]) => r);
            if(routeRatings.length > 0) {
                const avg = routeRatings.reduce((a,b)=>a+b,0)/routeRatings.length;
                const route = routes.find(r => r.id === routeId);
                if(route) route.rating = Math.round(avg * 10) / 10;
            }
            displayRoutes(currentRoutes);
        }

        function filterRoutes() {
            const from = document.getElementById('filterFrom').value.toLowerCase();
            const to = document.getElementById('filterTo').value.toLowerCase();
            const maxPrice = parseInt(document.getElementById('priceFilter').value);
            document.getElementById('priceValue').innerText = `0-${maxPrice}`;
            
            currentRoutes = routes.filter(r => 
                (from === '' || r.from.toLowerCase().includes(from)) &&
                (to === '' || r.to.toLowerCase().includes(to)) &&
                r.price <= maxPrice
            );
            sortRoutes(currentSort);
        }

        function sortRoutes(type) {
            currentSort = type;
            if(type === 'price') currentRoutes.sort((a,b) => a.price - b.price);
            else if(type === 'time') currentRoutes.sort((a,b) => a.time.localeCompare(b.time));
            else if(type === 'rating') currentRoutes.sort((a,b) => b.rating - a.rating);
            displayRoutes(currentRoutes);
        }

        function displayRoutes(routesToShow) {

                const userRating = JSON.parse(localStorage.getItem('route_ratings') || '{}')[route.id];
                const div = document.createElement("div");
                div.className = "route-card";
                div.innerHTML = `
                    <div class="route-header" onclick="toggleStops(${route.id})">
                        <div><strong>${route.from} → ${route.to}</strong><br>🕐 ${route.time} | 💰 ${route.price} грн | ⏱ ${route.duration}<br><span class="rating">${'⭐'.repeat(Math.floor(route.rating))} ${route.rating}</span></div>
                        <button class="toggle-stops" onclick="event.stopPropagation(); toggleStops(${route.id})">▼ Зупинки</button>
                    </div>
                    <div id="stops-${route.id}" style="display: none;" class="stops-list">
                        <strong>📍 Станції (купи квиток до будь-якої):</strong>
                        ${route.stops.map(stop => `<div class="stop-item" onclick="buyTicketToStop(${route.id}, '${stop.name}', ${stop.price}, '${stop.time}')"><span class="stop-name">${stop.name}</span><span><span class="stop-time">🕐 ${stop.time}</span><span class="stop-price">💰 ${stop.price} грн</span></span></div>`).join('')}
                    </div>
                    <div style="margin-top:10px;">
                        <button onclick="buyTicketFullRoute(${route.id})">🎫 Купити весь маршрут (${route.price} грн)</button>
                        <button onclick="rateRoute(${route.id})">⭐ Оцінити (${userRating ? 'Ваша оцінка: '+userRating : 'ще не оцінено'})</button>
                        <button onclick="toggleFavorite(${route.id})">⭐ Вибране</button>
                        <button onclick="showReviews(${route.id})">💬 Відгуки (${reviews.filter(r=>r.routeId===route.id).length})</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.rateRoute = function(routeId) {
            Swal.fire({
                title: 'Оцініть маршрут',
                input: 'select',
                inputOptions: { 1: '⭐ 1 зірка', 2: '⭐⭐ 2 зірки', 3: '⭐⭐⭐ 3 зірки', 4: '⭐⭐⭐⭐ 4 зірки', 5: '⭐⭐⭐⭐⭐ 5 зірок' },
                showCancelButton: true
            }).then(result => {
                if(result.isConfirmed) {
                    saveRating(routeId, parseInt(result.value));
                    Swal.fire('Дякуємо!', 'Вашу оцінку враховано', 'success');
                }
            });
        };

        window.toggleStops = function(id) { const div = document.getElementById(`stops-${id}`); if(div) div.style.display = div.style.display === 'none' ? 'block' : 'none'; };
        
        window.buyTicketToStop = function(routeId, stopName, price, time) {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if(!user) { Swal.fire('Потрібно увійти', '', 'question').then(()=>window.location.href='login.html'); return; }
            const travelDate = document.getElementById('filterDate').value || new Date().toISOString().split('T')[0];
            Swal.fire({ title: `Квиток до ${stopName}`, html: `Дата: ${travelDate}<br>Сума: ${price} грн`, confirmButtonText: 'Купити' }).then(() => { 
                const ticket = { id: Date.now(), from: routes.find(r=>r.id===routeId).from, to: stopName, price: price, date: travelDate, time: time };
                user.tickets = user.tickets || [];
                user.tickets.push(ticket);
                localStorage.setItem('current_user', JSON.stringify(user));
                const users = JSON.parse(localStorage.getItem('railway_users')||'[]');
                const idx = users.findIndex(u=>u.id===user.id);
                if(idx!==-1) users[idx]=user;
                localStorage.setItem('railway_users', JSON.stringify(users));
                Swal.fire('✅ Успіх!', `Квиток ${stopName} куплено на ${travelDate}!`, 'success');
            });
        };
        
        window.buyTicketFullRoute = function(routeId) {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if(!user) { Swal.fire('Потрібно увійти', '', 'question').then(()=>window.location.href='login.html'); return; }
            const route = routes.find(r => r.id === routeId);
            const travelDate = document.getElementById('filterDate').value || new Date().toISOString().split('T')[0];
            Swal.fire({ title: `Квиток ${route.from}→${route.to}`, html: `Дата: ${travelDate}<br>Сума: ${route.price} грн`, confirmButtonText: 'Купити' }).then(() => {
                const ticket = { id: Date.now(), from: route.from, to: route.to, price: route.price, date: travelDate, time: route.time };
                user.tickets = user.tickets || [];
                user.tickets.push(ticket);
                localStorage.setItem('current_user', JSON.stringify(user));
                const users = JSON.parse(localStorage.getItem('railway_users')||'[]');
                const idx = users.findIndex(u=>u.id===user.id);
                if(idx!==-1) users[idx]=user;
                localStorage.setItem('railway_users', JSON.stringify(users));
                Swal.fire('✅ Успіх!', `Квиток куплено на ${travelDate}!`, 'success');
            });
        };
        
        window.toggleFavorite = function(routeId) { let fav = JSON.parse(localStorage.getItem('favorites')||'[]'); if(fav.includes(routeId)) { fav=fav.filter(id=>id!==routeId); Swal.fire('','⭐ Видалено','info'); } else { fav.push(routeId); Swal.fire('','⭐ Додано','success'); } localStorage.setItem('favorites',JSON.stringify(fav)); };
        
        window.showReviews = function(routeId) {
            const route = routes.find(r => r.id === routeId);
            const routeReviews = reviews.filter(r => r.routeId === routeId);
            Swal.fire({ title: `Відгуки про ${route.from}→${route.to}`, html: `<textarea id="reviewText" class="swal2-textarea" placeholder="Ваш відгук..."></textarea><br>${routeReviews.map(r=>`⭐${r.rating} ${r.text}`).join('<br>') || 'Немає відгуків'}`, showCancelButton: true, confirmButtonText: 'Додати відгук' }).then(result => {
                if(result.isConfirmed) {
                    const text = document.getElementById('reviewText').value;
                    if(text) {
                        const user = JSON.parse(localStorage.getItem('current_user')||'{}');
                        reviews.push({ routeId, rating: 5, text: text, user: user.name || 'Анонім', date: new Date().toLocaleDateString() });
                        localStorage.setItem('railway_reviews', JSON.stringify(reviews));
                        Swal.fire('✅ Дякуємо!', 'Відгук додано', 'success');
                    }
                }
            });
        };
        
        function showUserStatus() { const user = JSON.parse(localStorage.getItem('current_user')); document.getElementById('userStatus').innerHTML = user ? `✅ Ви увійшли як ${user.name} | 🎫 Квитків: ${user.tickets?.length || 0} | <a href="profile.html">Кабінет</a> | <button onclick="logout()">Вийти</button>` : `🔒 Не увійшли | <a href="login.html">Увійти</a> | <a href="register.html">Реєстрація</a>`; }
        
        function logout() { localStorage.removeItem('current_user'); location.reload(); }
        function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        
        document.getElementById('priceFilter').addEventListener('input', () => filterRoutes());
        document.getElementById('filterFrom').addEventListener('input', () => filterRoutes());
        document.getElementById('filterTo').addEventListener('input', () => filterRoutes());
        
        filterRoutes();
        showUserStatus();
    </script>
</body>
</html>
