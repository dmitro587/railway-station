<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Залізничний вокзал</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .stops-list {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            font-size: 14px;
        }
        .stop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background: rgba(0,102,204,0.1);
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .stop-item:hover {
            background: rgba(0,102,204,0.2);
            transform: translateX(5px);
        }
        .stop-name {
            font-weight: bold;
        }
        .stop-price {
            color: #0066cc;
            font-weight: bold;
        }
        .stop-time {
            color: #666;
            font-size: 12px;
        }
        body.dark .stop-item {
            background: rgba(233,69,96,0.1);
        }
        body.dark .stop-price { color: #e94560; }
        body.dark .stop-time { color: #aaa; }
        .route-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toggle-stops {
            background: none;
            padding: 5px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚆 Залізничний вокзал</h1>
        <nav>
            <a href="index.html">🏠 Головна</a>
            <a href="news.html">📰 Новини</a>
            <a href="schedule.html">📅 Розклад</a>
            <a href="map.html">🗺 Карта</a>
            <a href="contacts.html">📞 Контакти</a>
            <a href="login.html">🔐 Вхід</a>
            <a href="register.html">📝 Реєстрація</a>
            <a href="profile.html">👤 Кабінет</a>
            <a href="admin.html">⚙ Адмін</a>
        </nav>
    </header>
    <main>
        <h2>⭐ Популярні маршрути</h2>
        <div id="popular-routes"></div>
        <div id="userStatus" class="route-card"></div>
    </main>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <script>
        // ========== МАРШРУТИ З ЗУПИНКАМИ ТА ЦІНАМИ ==========
        const routes = [
            { 
                id: 1, from: "Київ", to: "Львів", time: "08:00", price: 450, duration: "5 год",
                stops: [
                    { name: "Київ", price: 0, time: "08:00" },
                    { name: "Житомир", price: 120, time: "09:30" },
                    { name: "Рівне", price: 250, time: "11:00" },
                    { name: "Львів", price: 450, time: "13:00" }
                ]
            },
            { 
                id: 2, from: "Київ", to: "Одеса", time: "09:30", price: 420, duration: "4.5 год",
                stops: [
                    { name: "Київ", price: 0, time: "09:30" },
                    { name: "Біла Церква", price: 100, time: "10:45" },
                    { name: "Умань", price: 200, time: "12:00" },
                    { name: "Одеса", price: 420, time: "14:00" }
                ]
            },
            { 
                id: 3, from: "Київ", to: "Харків", time: "07:15", price: 380, duration: "4.5 год",
                stops: [
                    { name: "Київ", price: 0, time: "07:15" },
                    { name: "Полтава", price: 220, time: "09:30" },
                    { name: "Харків", price: 380, time: "11:45" }
                ]
            },
            { 
                id: 4, from: "Київ", to: "Дніпро", time: "10:00", price: 350, duration: "4 год",
                stops: [
                    { name: "Київ", price: 0, time: "10:00" },
                    { name: "Кременчук", price: 200, time: "12:00" },
                    { name: "Дніпро", price: 350, time: "14:00" }
                ]
            },
            { 
                id: 5, from: "Київ", to: "Запоріжжя", time: "11:30", price: 400, duration: "5 год",
                stops: [
                    { name: "Київ", price: 0, time: "11:30" },
                    { name: "Кременчук", price: 200, time: "13:30" },
                    { name: "Дніпро", price: 300, time: "15:00" },
                    { name: "Запоріжжя", price: 400, time: "16:30" }
                ]
            },
            { 
                id: 6, from: "Львів", to: "Київ", time: "07:00", price: 460, duration: "5.5 год",
                stops: [
                    { name: "Львів", price: 0, time: "07:00" },
                    { name: "Рівне", price: 200, time: "08:30" },
                    { name: "Житомир", price: 320, time: "10:00" },
                    { name: "Київ", price: 460, time: "12:30" }
                ]
            },
            { 
                id: 7, from: "Львів", to: "Ужгород", time: "08:30", price: 350, duration: "3.5 год",
                stops: [
                    { name: "Львів", price: 0, time: "08:30" },
                    { name: "Стрий", price: 80, time: "09:15" },
                    { name: "Мукачево", price: 250, time: "10:30" },
                    { name: "Ужгород", price: 350, time: "12:00" }
                ]
            },
            { 
                id: 8, from: "Одеса", to: "Київ", time: "08:00", price: 440, duration: "5 год",
                stops: [
                    { name: "Одеса", price: 0, time: "08:00" },
                    { name: "Умань", price: 220, time: "10:00" },
                    { name: "Біла Церква", price: 340, time: "11:30" },
                    { name: "Київ", price: 440, time: "13:00" }
                ]
            },
            { 
                id: 9, from: "Харків", to: "Київ", time: "06:30", price: 400, duration: "4.5 год",
                stops: [
                    { name: "Харків", price: 0, time: "06:30" },
                    { name: "Полтава", price: 160, time: "08:00" },
                    { name: "Київ", price: 400, time: "11:00" }
                ]
            },
            { 
                id: 10, from: "Дніпро", to: "Львів", time: "20:00", price: 580, duration: "10 год",
                stops: [
                    { name: "Дніпро", price: 0, time: "20:00" },
                    { name: "Кременчук", price: 150, time: "21:30" },
                    { name: "Кропивницький", price: 250, time: "23:00" },
                    { name: "Вінниця", price: 400, time: "02:00" },
                    { name: "Львів", price: 580, time: "06:00" }
                ]
            }
        ];

        let reviews = JSON.parse(localStorage.getItem('railway_reviews') || '[]');

        function saveRoutes() { localStorage.setItem("railway_routes", JSON.stringify(routes)); }
        function loadRoutes() { const saved = localStorage.getItem("railway_routes"); if(saved) routes = JSON.parse(saved); else saveRoutes(); }

        // Показ маршрутів з зупинками
        function showPopularRoutes() {
            const container = document.getElementById("popular-routes");
            if(!container) return;
            container.innerHTML = "";
            const topRoutes = routes.slice(0, 10);
            topRoutes.forEach(route => {
                const div = document.createElement("div");
                div.className = "route-card";
                div.innerHTML = `
                    <div class="route-header" onclick="toggleStops(${route.id})">
                        <div>
                            <strong>${route.from} → ${route.to}</strong><br>
                            🕐 ${route.time} | 💰 ${route.price} грн | ⏱ ${route.duration}
                        </div>
                        <button class="toggle-stops" onclick="event.stopPropagation(); toggleStops(${route.id})">▼ Зупинки</button>
                    </div>
                    <div id="stops-${route.id}" style="display: none;" class="stops-list">
                        <strong>📍 Проміжні станції (купи квиток до будь-якої):</strong>
                        ${route.stops.map(stop => `
                            <div class="stop-item" onclick="buyTicketToStop(${route.id}, '${stop.name}', ${stop.price}, '${stop.time}')">
                                <span class="stop-name">${stop.name}</span>
                                <span>
                                    <span class="stop-time">🕐 ${stop.time}</span>
                                    <span class="stop-price">💰 ${stop.price} грн</span>
                                </span>
                            </div>
                        `).join('')}
                    </div>
                    <div style="margin-top: 10px;">
                        <button onclick="buyTicketFullRoute(${route.id})">🎫 Купити весь маршрут (${route.price} грн)</button>
                        <button onclick="toggleFavorite(${route.id})">⭐ Вибране</button>
                        <button onclick="showReviews(${route.id})">💬 Відгуки (${reviews.filter(r=>r.routeId===route.id).length})</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Показати/сховати зупинки
        window.toggleStops = function(routeId) {
            const stopsDiv = document.getElementById(`stops-${routeId}`);
            if(stopsDiv) {
                if(stopsDiv.style.display === 'none') {
                    stopsDiv.style.display = 'block';
                } else {
                    stopsDiv.style.display = 'none';
                }
            }
        };

        // Покупка квитка ДО конкретної зупинки
        window.buyTicketToStop = function(routeId, stopName, price, time) {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if(!user) {
                Swal.fire({ title: 'Потрібно увійти', text: 'Перейти на сторінку входу?', icon: 'question', showCancelButton: true }).then(result => {
                    if(result.isConfirmed) window.location.href = 'login.html';
                });
                return;
            }
            
            const route = routes.find(r => r.id === routeId);
            
            Swal.fire({ title: 'Виберіть місце', input: 'number', inputPlaceholder: 'Номер місця (1-32)', showCancelButton: true }).then(seatResult => {
                if(seatResult.isConfirmed && seatResult.value >= 1 && seatResult.value <= 32) {
                    Swal.fire({ title: 'Оплата', text: `Квиток: ${route.from} → ${stopName}\nСума: ${price} грн\nВведіть 16 цифр картки`, input: 'text', inputPlaceholder: '1234 5678 9012 3456', showCancelButton: true }).then(payResult => {
                        if(payResult.isConfirmed && payResult.value && payResult.value.replace(/\s/g, '').length >= 16) {
                            const ticket = {
                                id: Date.now(),
                                from: route.from,
                                to: stopName,
                                time: time,
                                price: price,
                                date: new Date().toLocaleDateString(),
                                seat: seatResult.value,
                                duration: `часу до ${stopName}`
                            };
                            user.tickets = user.tickets || [];
                            user.tickets.push(ticket);
                            const users = JSON.parse(localStorage.getItem('railway_users')||'[]');
                            const idx = users.findIndex(u=>u.id===user.id);
                            if(idx!==-1) users[idx]=user;
                            localStorage.setItem('railway_users', JSON.stringify(users));
                            localStorage.setItem('current_user', JSON.stringify(user));
                            
                            let stats = JSON.parse(localStorage.getItem('ticket_stats') || '[]');
                            stats.push({ routeId, from: route.from, to: stopName, price: price, date: new Date().toLocaleDateString() });
                            localStorage.setItem('ticket_stats', JSON.stringify(stats));
                            
                            Swal.fire('✅ Успіх!', `Квиток куплено!\n${route.from} → ${stopName}\nМісце: ${seatResult.value}\nСума: ${price} грн`, 'success');
                        } else if(payResult.isConfirmed) Swal.fire('❌ Помилка', 'Невірний номер картки', 'error');
                    });
                } else if(seatResult.isConfirmed) Swal.fire('❌ Помилка', 'Виберіть місце від 1 до 32', 'error');
            });
        };

        // Покупка всього маршруту
        window.buyTicketFullRoute = function(routeId) {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if(!user) {
                Swal.fire({ title: 'Потрібно увійти', text: 'Перейти на сторінку входу?', icon: 'question', showCancelButton: true }).then(result => {
                    if(result.isConfirmed) window.location.href = 'login.html';
                });
                return;
            }
            const route = routes.find(r => r.id === routeId);
            
            Swal.fire({ title: 'Виберіть місце', input: 'number', inputPlaceholder: 'Номер місця (1-32)', showCancelButton: true }).then(seatResult => {
                if(seatResult.isConfirmed && seatResult.value >= 1 && seatResult.value <= 32) {
                    Swal.fire({ title: 'Оплата', text: `Квиток: ${route.from} → ${route.to}\nСума: ${route.price} грн\nВведіть 16 цифр картки`, input: 'text', inputPlaceholder: '1234 5678 9012 3456', showCancelButton: true }).then(payResult => {
                        if(payResult.isConfirmed && payResult.value && payResult.value.replace(/\s/g, '').length >= 16) {
                            const ticket = {
                                id: Date.now(), from: route.from, to: route.to, time: route.time,
                                price: route.price, date: new Date().toLocaleDateString(),
                                seat: seatResult.value, duration: route.duration
                            };
                            user.tickets = user.tickets || [];
                            user.tickets.push(ticket);
                            const users = JSON.parse(localStorage.getItem('railway_users')||'[]');
                            const idx = users.findIndex(u=>u.id===user.id);
                            if(idx!==-1) users[idx]=user;
                            localStorage.setItem('railway_users', JSON.stringify(users));
                            localStorage.setItem('current_user', JSON.stringify(user));
                            
                            let stats = JSON.parse(localStorage.getItem('ticket_stats') || '[]');
                            stats.push({ routeId, from: route.from, to: route.to, price: route.price, date: new Date().toLocaleDateString() });
                            localStorage.setItem('ticket_stats', JSON.stringify(stats));
                            
                            Swal.fire('✅ Успіх!', `Квиток куплено!\n${route.from} → ${route.to}\nМісце: ${seatResult.value}\nСума: ${route.price} грн`, 'success');
                        } else if(payResult.isConfirmed) Swal.fire('❌ Помилка', 'Невірний номер картки', 'error');
                    });
                } else if(seatResult.isConfirmed) Swal.fire('❌ Помилка', 'Виберіть місце від 1 до 32', 'error');
            });
        };
        
        // Вибране
        window.toggleFavorite = function(routeId) {
            let fav = JSON.parse(localStorage.getItem('favorites') || '[]');
            if(fav.includes(routeId)) {
                fav = fav.filter(id => id !== routeId);
                Swal.fire('Інформація', '⭐ Видалено з вибраного', 'info');
            } else {
                fav.push(routeId);
                Swal.fire('Успіх!', '⭐ Додано до вибраного!', 'success');
            }
            localStorage.setItem('favorites', JSON.stringify(fav));
        };
        
        // Відгуки
        window.showReviews = function(routeId) {
            const route = routes.find(r => r.id === routeId);
            const routeReviews = reviews.filter(r => r.routeId === routeId);
            const reviewList = routeReviews.length ? routeReviews.map(r=>`⭐${r.rating} ${r.text} - ${r.user}`).join('\n') : 'Немає відгуків';
            Swal.fire({
                title: `Відгуки про ${route.from}→${route.to}`,
                html: `<textarea id="reviewText" class="swal2-textarea" placeholder="Оцінка 1-5 і текст, наприклад: 4 Гарний потяг"></textarea><br><div style="text-align:left; max-height:200px; overflow:auto;">${reviewList}</div>`,
                showCancelButton: true, confirmButtonText: 'Додати відгук'
            }).then(result => {
                if(result.isConfirmed) {
                    const text = document.getElementById('reviewText').value;
                    const match = text.match(/^([1-5])\s*(.*)$/);
                    if(match) {
                        const user = JSON.parse(localStorage.getItem('current_user')||'{}');
                        reviews.push({ routeId, rating: match[1], text: match[2], user: user.name || 'Анонім', date: new Date().toLocaleDateString() });
                        localStorage.setItem('railway_reviews', JSON.stringify(reviews));
                        Swal.fire('✅ Успіх!', 'Відгук додано!', 'success');
                        showPopularRoutes();
                    } else Swal.fire('❌ Помилка', 'Формат: "4 Гарний потяг"', 'error');
                }
            });
        };
        
        // Статус користувача
        function showUserStatus() {
            const user = JSON.parse(localStorage.getItem('current_user'));
            const div = document.getElementById('userStatus');
            if(user) {
                div.innerHTML = `✅ Ви увійшли як <strong>${user.name}</strong> | 🎫 Квитків: ${user.tickets?.length || 0} | <a href="profile.html">Мої квитки</a> | <button onclick="logout()">Вийти</button>`;
            } else {
                div.innerHTML = `🔒 Ви не увійшли | <a href="login.html">Увійти</a> | <a href="register.html">Зареєструватися</a>`;
            }
        }
        
        function logout() {
            localStorage.removeItem('current_user');
            Swal.fire('Ви вийшли', 'До побачення!', 'info').then(() => location.reload());
        }
        
        // Темна тема
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        
        loadRoutes();
        showPopularRoutes();
        showUserStatus();
    </script>
</body>
</html>
