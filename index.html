    <script>
        // ========== SUPABASE ==========
        const SUPABASE_URL = 'https://rvngppzmkhwwbdnauduo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_2wv2wpymRS-9NcFyqCFWDA_aSUwASzY';
        const sbClient = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========== ГОДИННИК ==========
        function updateDateTime() {
            const now = new Date();
            const dateEl = document.getElementById('currentDate');
            const timeEl = document.getElementById('currentTime');
            if (dateEl) dateEl.innerText = now.toLocaleDateString('uk-UA');
            if (timeEl) timeEl.innerText = now.toLocaleTimeString('uk-UA');
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // ========== СЛАЙДЕР ==========
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dotsContainer = document.getElementById('dots');
        
        function createDots() {
            if (!dotsContainer) return;
            dotsContainer.innerHTML = '';
            slides.forEach((_, i) => {
                const dot = document.createElement('span');
                dot.className = 'dot';
                dot.onclick = () => goToSlide(i);
                dotsContainer.appendChild(dot);
            });
            updateDots();
        }
        function updateDots() { document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentSlide)); }
        function updateSlider() { document.getElementById('slider').style.transform = `translateX(-${currentSlide * 100}%)`; updateDots(); }
        window.nextSlide = function() { currentSlide = (currentSlide + 1) % slides.length; updateSlider(); };
        window.prevSlide = function() { currentSlide = (currentSlide - 1 + slides.length) % slides.length; updateSlider(); };
        window.goToSlide = function(index) { currentSlide = index; updateSlider(); };
        createDots();
        setInterval(() => { nextSlide(); }, 5000);

        // ========== ШВИДКИЙ ПОШУК ==========
        window.quickSearch = function() {
            const from = document.getElementById('quickFrom')?.value;
            const to = document.getElementById('quickTo')?.value;
            if (from && to) {
                localStorage.setItem('search_from', from);
                localStorage.setItem('search_to', to);
                window.location.href = 'schedule.html';
            } else {
                Swal.fire('Введіть міста', 'Будь ласка, введіть "Звідки" та "Куди"', 'info');
            }
        };
        window.searchTag = function(from, to) {
            localStorage.setItem('search_from', from);
            localStorage.setItem('search_to', to);
            window.location.href = 'schedule.html';
        };

        // ========== ЛІЧИЛЬНИК ==========
        function updatePassengerCounter() {
            const stats = JSON.parse(localStorage.getItem('ticket_stats') || '[]');
            let count = stats.length + 10000;
            const counterEl = document.getElementById('passengerCounter');
            if (counterEl) counterEl.innerText = count.toLocaleString();
        }
        updatePassengerCounter();

        // ========== ПОГОДА ==========
        async function getWeather(city) {
            const weatherMap = {
                "Київ": "☀️ +22°C", "Львів": "⛅ +18°C", "Одеса": "🌊 +24°C",
                "Харків": "☁️ +20°C", "Дніпро": "🌤️ +21°C", "Запоріжжя": "☀️ +23°C",
                "Вінниця": "🌦️ +17°C", "Житомир": "☁️ +16°C", "Чернігів": "🌥️ +15°C",
                "Суми": "☁️ +14°C", "Полтава": "🌤️ +18°C", "Тернопіль": "⛅ +16°C",
                "Луцьк": "☁️ +15°C", "Рівне": "🌦️ +14°C", "Хмельницький": "☁️ +16°C",
                "Чернівці": "☀️ +19°C", "Ужгород": "☀️ +21°C", "Івано-Франківськ": "🌤️ +17°C",
                "Миколаїв": "☀️ +22°C", "Херсон": "☀️ +23°C", "Кропивницький": "🌤️ +18°C"
            };
            return weatherMap[city] || "🌡️ +15°C";
        }

        // ========== МАРШРУТИ З SUPABASE ==========
        async function fetchRoutes() {
            try {
                const { data, error } = await sbClient.from('routes').select('*').order('id');
                if (error) throw error;
                return data || [];
            } catch (err) {
                console.error('Помилка:', err);
                return [];
            }
        }

        async function displayRoutes() {
            const container = document.getElementById('popular-routes');
            if (!container) return;
            container.innerHTML = '<div class="loading">⏳ Завантаження маршрутів...</div>';
            const routes = await fetchRoutes();
            if (!routes || routes.length === 0) {
                container.innerHTML = '<div class="loading">📭 Немає маршрутів. Додайте в адмінці.</div>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < Math.min(routes.length, 6); i++) {
                const route = routes[i];
                const weather = await getWeather(route.to_city || route.to);
                html += `
                    <div class="route-card">
                        <strong>${route.from_city || route.from} → ${route.to_city || route.to}</strong><br>
                        🕐 ${route.time} | 💰 ${route.price} грн | ⏱ ${route.duration || '3 год'}<br>
                        ⭐ ${route.rating || 0}<br>
                        🌡️ ${weather}<br>
                        <button onclick="buyTicket(${route.id})">🎫 Купити</button>
                        <button onclick="alert('⭐ Додано до вибраного')">⭐ Вибране</button>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        window.buyTicket = function(routeId) {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if (!user) {
                Swal.fire('Потрібно увійти', '', 'question').then(() => window.location.href = 'login.html');
                return;
            }
            Swal.fire('✅ Квиток куплено!', 'Перевірте особистий кабінет', 'success');
        };

        // ========== СТАТУС КОРИСТУВАЧА ==========
        function showUserStatus() {
            const user = JSON.parse(localStorage.getItem('current_user'));
            const statusDiv = document.getElementById('userStatus');
            if (!statusDiv) return;
            if (user) {
                statusDiv.innerHTML = `✅ Ви увійшли як ${user.name} | <a href="profile.html">Кабінет</a> | <button onclick="logout()">Вийти</button>`;
            } else {
                statusDiv.innerHTML = `🔒 Не увійшли | <a href="login.html">Увійти</a> | <a href="register.html">Реєстрація</a>`;
            }
        }
        window.logout = function() { localStorage.removeItem('current_user'); location.reload(); };

        // ========== ТЕМНА ТЕМА ==========
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }

        // ========== ЗАПУСК ==========
        displayRoutes();
        showUserStatus();
    </script>
