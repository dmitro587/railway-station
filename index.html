<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Залізничний вокзал</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .theme-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
        }
        body.dark {
            background: #1a1a2e;
        }
        body.dark .route-card {
            background: #16213e;
            color: #eee;
        }
        body.dark header {
            background: #0f3460;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚆 Залізничний вокзал</h1>
        <nav>
            <a href="index.html">Головна</a>
            <a href="news.html">Новини</a>
            <a href="schedule.html">Розклад</a>
            <a href="route.html">Маршрут</a>
            <a href="contacts.html">Контакти</a>
            <a href="login.html">Вхід</a>
            <a href="register.html">Реєстрація</a>
            <a href="profile.html">Кабінет</a>
            <a href="admin.html">Адмін</a>
        </nav>
    </header>
    <main>
        <h2>⭐ Популярні маршрути</h2>
        <div id="popular-routes"></div>
        <div id="userStatus" class="route-card"></div>
    </main>
    
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    
    <script>
        let routes = [
            { id: 1, from: "Київ", to: "Львів", time: "08:00", price: 450 },
            { id: 2, from: "Харків", to: "Одеса", time: "10:30", price: 520 },
            { id: 3, from: "Київ", to: "Харків", time: "14:15", price: 380 }
        ];
        
        function showPopularRoutes() {
            const container = document.getElementById("popular-routes");
            if(!container) return;
            container.innerHTML = "";
            routes.forEach(route => {
                const div = document.createElement("div");
                div.className = "route-card";
                div.innerHTML = `
                    <strong>${route.from} → ${route.to}</strong><br>
                    Час: ${route.time} | Ціна: ${route.price} грн<br>
                    <button onclick="buyTicket(${route.id})">🎫 Купити</button>
                    <button onclick="toggleFavorite(${route.id})">⭐ Вибране</button>
                    <button onclick="showReviews(${route.id})">💬 Відгуки</button>
                `;
                container.appendChild(div);
            });
        }
        
        window.buyTicket = function(routeId) {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if(!user) {
                if(confirm('Потрібно увійти. Перейти на вхід?')) window.location.href='login.html';
                return;
            }
            const route = routes.find(r => r.id === routeId);
            if(!route) return;
            const cardNumber = prompt("Введіть номер картки (16 цифр):");
            if(cardNumber && cardNumber.length === 16) {
                alert(`✅ Квиток куплено! ${route.from} → ${route.to}\nОплачено: ${route.price} грн`);
            } else if(cardNumber) alert("❌ Невірний номер картки");
        };
        
        window.toggleFavorite = function(routeId) {
            let fav = JSON.parse(localStorage.getItem('favorites') || '[]');
            if(fav.includes(routeId)) {
                fav = fav.filter(id => id !== routeId);
                alert('⭐ Видалено з вибраного');
            } else {
                fav.push(routeId);
                alert('⭐ Додано до вибраного!');
            }
            localStorage.setItem('favorites', JSON.stringify(fav));
        };
        
        window.showReviews = function(routeId) {
            const route = routes.find(r => r.id === routeId);
            prompt(`Відгук про ${route.from}→${route.to}:\n(Введіть оцінку 1-5 і текст)`);
            alert('✅ Відгук додано!');
        };
        
        function showUserStatus() {
            const user = JSON.parse(localStorage.getItem('current_user'));
            const div = document.getElementById('userStatus');
            if(user) {
                div.innerHTML = `✅ Ви увійшли як <strong>${user.name}</strong> | <a href="profile.html">Мої квитки</a> | <button onclick="logout()">Вийти</button>`;
            } else {
                div.innerHTML = `🔒 Ви не увійшли | <a href="login.html">Увійти</a> | <a href="register.html">Зареєструватися</a>`;
            }
        }
        
        function logout() {
            localStorage.removeItem('current_user');
            alert('Ви вийшли');
            location.reload();
        }
        
        // ========== ТЕМНА ТЕМА ==========
        function toggleTheme() {
            document.body.classList.toggle('dark');
            if(document.body.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        }
        
        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
        
        showPopularRoutes();
        showUserStatus();
    </script>
</body>
</html>
