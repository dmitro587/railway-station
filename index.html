    <style>
        .stops-list {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            font-size: 14px;
        }
        .stop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background: rgba(0,102,204,0.1);
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .stop-item:hover {
            background: rgba(0,102,204,0.2);
            transform: translateX(5px);
        }
        .stop-name { font-weight: bold; }
        .stop-price { color: #0066cc; font-weight: bold; }
        .stop-time { color: #666; font-size: 12px; }
        body.dark .stop-item { background: rgba(233,69,96,0.1); }
        body.dark .stop-price { color: #e94560; }
        .route-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toggle-stops { background: none; padding: 5px 10px; font-size: 12px; }
    </style>

        let reviews = JSON.parse(localStorage.getItem('railway_reviews') || '[]');

        function showPopularRoutes() {
            const container = document.getElementById("popular-routes");
            if(!container) return;
            container.innerHTML = "";
            const topRoutes = routes.slice(0, 10);
            topRoutes.forEach(route => {
                const div = document.createElement("div");
                div.className = "route-card";
                div.innerHTML = `
                    <div class="route-header" onclick="toggleStops(${route.id})">
                        <div><strong>${route.from} → ${route.to}</strong><br>🕐 ${route.time} | 💰 ${route.price} грн | ⏱ ${route.duration}</div>
                        <button class="toggle-stops" onclick="event.stopPropagation(); toggleStops(${route.id})">▼ Зупинки</button>
                    </div>
                    <div id="stops-${route.id}" style="display: none;" class="stops-list">
                        <strong>📍 Станції (купи квиток до будь-якої):</strong>
                        ${route.stops.map(stop => `<div class="stop-item" onclick="buyTicketToStop(${route.id}, '${stop.name}', ${stop.price}, '${stop.time}')"><span class="stop-name">${stop.name}</span><span><span class="stop-time">🕐 ${stop.time}</span><span class="stop-price">💰 ${stop.price} грн</span></span></div>`).join('')}
                    </div>
                    <div style="margin-top:10px;"><button onclick="buyTicketFullRoute(${route.id})">🎫 Купити весь маршрут (${route.price} грн)</button><button onclick="toggleFavorite(${route.id})">⭐ Вибране</button><button onclick="showReviews(${route.id})">💬 Відгуки (${reviews.filter(r=>r.routeId===route.id).length})</button></div>
                `;
                container.appendChild(div);
            });
        }

        window.toggleStops = function(id) { const div = document.getElementById(`stops-${id}`); if(div) div.style.display = div.style.display === 'none' ? 'block' : 'none'; };
        window.buyTicketToStop = function(routeId, stopName, price, time) {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if(!user) { Swal.fire('Потрібно увійти', '', 'question').then(()=>window.location.href='login.html'); return; }
            Swal.fire({ title: `Квиток до ${stopName}`, text: `Сума: ${price} грн`, confirmButtonText: 'Купити' }).then(() => { Swal.fire('✅ Успіх!', `Квиток ${stopName} куплено!`, 'success'); });
        };
        window.buyTicketFullRoute = function(routeId) {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if(!user) { Swal.fire('Потрібно увійти', '', 'question').then(()=>window.location.href='login.html'); return; }
            Swal.fire('✅ Успіх!', 'Квиток куплено!', 'success');
        };
        window.toggleFavorite = function(routeId) { let fav = JSON.parse(localStorage.getItem('favorites')||'[]'); if(fav.includes(routeId)) { fav=fav.filter(id=>id!==routeId); Swal.fire('','⭐ Видалено','info'); } else { fav.push(routeId); Swal.fire('','⭐ Додано','success'); } localStorage.setItem('favorites',JSON.stringify(fav)); };
        window.showReviews = function(routeId) { Swal.fire('Відгуки', 'Поки що немає відгуків', 'info'); };
        function showUserStatus() { const user = JSON.parse(localStorage.getItem('current_user')); document.getElementById('userStatus').innerHTML = user ? `✅ Ви увійшли як ${user.name} | <a href="profile.html">Кабінет</a> | <button onclick="logout()">Вийти</button>` : `🔒 Не увійшли | <a href="login.html">Увійти</a> | <a href="register.html">Реєстрація</a>`; }
        function logout() { localStorage.removeItem('current_user'); location.reload(); }
        function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
