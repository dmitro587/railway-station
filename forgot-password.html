<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Відновлення пароля</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header>
        <h1>🔐 Відновлення пароля</h1>
        <nav>
            <a href="index.html">🏠 Головна</a>
            <a href="login.html">🔐 Вхід</a>
            <a href="register.html">📝 Реєстрація</a>
        </nav>
    </header>
    <main>
        <div class="form-container">
            <h2>🔑 Забули пароль?</h2>
            <p>Введіть ваш email, і ми покажемо ваш пароль (так, це проста версія)</p>
            <input type="email" id="forgotEmail" placeholder="Ваш email" style="width:100%; padding:10px; margin:10px 0">
            <button onclick="recoverPassword()" style="width:100%; padding:10px">Відновити</button>
            <p><a href="login.html">← Повернутися до входу</a></p>
        </div>
    </main>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <script>
        function recoverPassword() {
            const email = document.getElementById('forgotEmail').value.trim();
            
            if(!email) {
                Swal.fire('Помилка', 'Введіть email', 'error');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('railway_users') || '[]');
            const user = users.find(u => u.email === email);
            
            if(user) {
                Swal.fire('Ваш пароль', `Email: ${user.email}\nПароль: ${user.password}\n\nЗбережіть його в безпечному місці!`, 'info');
            } else {
                Swal.fire('Помилка', 'Користувача з таким email не знайдено', 'error');
            }
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    </script>
</body>
</html>
