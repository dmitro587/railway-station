<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Карта маршрутів</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <header><h1>🗺 Карта маршрутів</h1><nav><a href="index.html">Головна</a><a href="news.html">Новини</a><a href="schedule.html">Розклад</a><a href="map.html">Карта</a><a href="contacts.html">Контакти</a><a href="login.html">Вхід</a><a href="register.html">Реєстрація</a><a href="profile.html">Кабінет</a><a href="admin.html">Адмін</a></nav></header>
    <main><div id="map" style="height: 500px; border-radius: 10px;"></div></main>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    <script>
        const map = L.map('map').setView([49.0, 31.0], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        const routes = JSON.parse(localStorage.getItem('railway_routes') || '[]');
        const cities = { 'Київ': [50.4501, 30.5234], 'Львів': [49.8397, 24.0297], 'Харків': [49.9935, 36.2304], 'Одеса': [46.4825, 30.7233] };
        routes.forEach(route => {
            const fromCoord = cities[route.from];
            const toCoord = cities[route.to];
            if(fromCoord && toCoord) {
                L.marker(fromCoord).addTo(map).bindPopup(route.from);
                L.marker(toCoord).addTo(map).bindPopup(route.to);
                L.polyline([fromCoord, toCoord], { color: '#0066cc', weight: 3 }).addTo(map).bindPopup(`${route.from} → ${route.to}<br>Час: ${route.time}<br>Ціна: ${route.price} грн`);
            }
        });
        function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    </script>
</body>
</html>
