            { id: 48, from: "Хмельницький", to: "Київ", via: ["Вінниця", "Фастів"], price: 320, time: "07:30", duration: "3.5 год" },
            { id: 49, from: "Чернігів", to: "Одеса", via: ["Київ", "Умань", "Біла Церква"], price: 480, time: "08:30", duration: "6.5 год" },
            { id: 50, from: "Суми", to: "Миколаїв", via: ["Полтава", "Кременчук", "Кропивницький"], price: 460, time: "09:00", duration: "6 год" }

        let map;
        let currentLayer = null;
        let markers = [];

        // Ініціалізація карти
        function initMap() {
            map = L.map('map').setView([49.0, 31.0], 6);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
            }).addTo(map);
            
            // Додаємо всі маршрути
            showAllRoutes();
            
            // Додаємо станції в випадаючий список
            const select = document.getElementById('routeSelect');
            routes.forEach(route => {
                const option = document.createElement('option');
                option.value = route.id;
                option.textContent = `${route.from} → ${route.to} (${route.time})`;
                select.appendChild(option);
            });
        }

        // Показати всі маршрути
        function showAllRoutes() {
            if (currentLayer) map.removeLayer(currentLayer);
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            const allStations = new Set();
            routes.forEach(route => {
                const points = [coordinates[route.from], ...(route.via?.map(s => coordinates[s]) || []), coordinates[route.to]].filter(p => p);
                if(points.length > 1) {
                    const line = L.polyline(points, { color: '#0066cc', weight: 3, opacity: 0.7 });
                    line.addTo(map);
                    if(currentLayer) map.removeLayer(currentLayer);
                    currentLayer = line;
                }
            });
            
            // Додаємо маркери станцій
            const allStationNames = new Set();
            routes.forEach(route => {
                allStationNames.add(route.from);
                allStationNames.add(route.to);
                route.via?.forEach(s => allStationNames.add(s));
            });
            
            allStationNames.forEach(station => {
                const coord = coordinates[station];
                if(coord) {
                    const isTerminal = routes.some(r => r.to === station || r.from === station);
                    const color = isTerminal ? '#ff9900' : '#e94560';
                    const marker = L.circleMarker(coord, { radius: 6, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.8 })
                        .bindPopup(`<b>${station}</b><br>📌 Залізнична станція`)
                        .addTo(map);
                    markers.push(marker);
                }
            });
        }

        // Фільтр за маршрутом
        function filterRoute() {
            const routeId = parseInt(document.getElementById('routeSelect').value);
            if(!routeId || routeId === 'all') return showAllRoutes();
            
            const route = routes.find(r => r.id === routeId);
            if(!route) return;
            
            if(currentLayer) map.removeLayer(currentLayer);
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            const points = [coordinates[route.from], ...(route.via?.map(s => coordinates[s]) || []), coordinates[route.to]].filter(p => p);
            const line = L.polyline(points, { color: '#e94560', weight: 5 });
            line.addTo(map);
            currentLayer = line;
            map.fitBounds(line.getBounds());
            
            // Додаємо маркери для цього маршруту
            [route.from, ...(route.via || []), route.to].forEach(station => {
                const coord = coordinates[station];
                if(coord) {
                    const marker = L.circleMarker(coord, { radius: 8, fillColor: '#ff9900', color: '#fff', weight: 2 })
                        .bindPopup(`<b>${station}</b><br>🕐 ${route.time}<br>💰 ${route.price} грн`)
                        .addTo(map);
                    markers.push(marker);
                }
            });
        }

        // Скинути карту
        function resetMap() {
            showAllRoutes();
            map.setView([49.0, 31.0], 6);
            document.getElementById('routeSelect').value = 'all';
        }

        // Показати всі станції
        function showAllStations() {
            resetMap();
            Swal.fire('Показано всі станції', `Всього станцій: ${markers.length}`, 'info');
        }

        // Темна тема для карти
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            // Оновлюємо карту
            if(map) {
                map.remove();
                initMap();
            }
        }

        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        
        window.onload = initMap;
    </script>
