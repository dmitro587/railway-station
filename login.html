<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { validateLogin } from './js/validation.js';
        import { showErrors, showFormStatus } from './js/ui/forms.js';
        import { loginUser } from './js/services/auth.js';

        // Елементи форми
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('loginEmail');
        const passwordInput = document.getElementById('loginPassword');
        const statusEl = document.getElementById('formStatus');

        // Обробка відправки форми
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const payload = {
                email: emailInput.value.trim(),
                password: passwordInput.value
            };
            
            // Валідація
            const { isValid, errors } = validateLogin(payload);
            showErrors(form, errors);
            
            if (!isValid) return;
            
            // Спроба входу
            const result = loginUser(payload.email, payload.password);
            
            if (result.success) {
                showFormStatus(statusEl, '✅ Вхід виконано! Перенаправлення...', false);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showFormStatus(statusEl, result.error, true);
            }
        });
    </script>
</head>
<body>
    <header>
        <h1>🚆 Вхід до системи</h1>
        <nav>
            <a href="index.html">🏠 Головна</a>
            <a href="news.html">📰 Новини</a>
            <a href="schedule.html">📅 Розклад</a>
            <a href="map.html">🗺 Карта</a>
            <a href="contacts.html">📞 Контакти</a>
            <a href="login.html">🔐 Вхід</a>
            <a href="register.html">📝 Реєстрація</a>
            <a href="profile.html">👤 Кабінет</a>
            <a href="admin.html">⚙ Адмін</a>
        </nav>
    </header>
    <main>
        <div class="form-container">
            <h2>🔐 Вхід</h2>
            <form id="loginForm">
                <div>
                    <input type="email" id="loginEmail" name="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0">
                    <div class="field-error" data-error="email" hidden></div>
                </div>
                <div>
                    <input type="password" id="loginPassword" name="password" placeholder="Пароль" style="width:100%; padding:10px; margin:10px 0">
                    <div class="field-error" data-error="password" hidden></div>
                </div>
                <button type="submit" style="width:100%; padding:10px">Увійти</button>
                <div id="formStatus" class="status" hidden></div>
            </form>
            <p>Немає акаунту? <a href="register.html">Зареєструватися</a></p>
            <p><a href="forgot-password.html">Забули пароль?</a></p>
        </div>
    </main>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <script>
        // Темна тема (окремий скрипт, бо він не залежить від модулів)
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    </script>
</body>
</html>
