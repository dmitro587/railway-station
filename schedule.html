        // ========== ЗБЕРЕЖЕННЯ ТА ЗАВАНТАЖЕННЯ ==========
        function saveRoutes() { 
            localStorage.setItem("railway_routes", JSON.stringify(routes)); 
        }
        
        function loadRoutes() { 
            const saved = localStorage.getItem("railway_routes"); 
            if(saved) routes = JSON.parse(saved); 
            else saveRoutes(); 
        }

        // ========== ПОКАЗ ВСІХ МАРШРУТІВ ==========
        function showAllRoutes() {
            const tbody = document.getElementById("routesList");
            if(!tbody) return;
            
            tbody.innerHTML = routes.map(r => `
                <tr>
                    <td><strong>${r.from}</strong></td>
                    <td><strong>${r.to}</strong></td>
                    <td>🕐 ${r.time}</td>
                    <td>💰 ${r.price} грн</td>
                    <td>⏱ ${r.duration || '3 год'}</td>
                    <td>📏 ${r.distance || '---'}</td>
                    <td><button class="buy-btn" onclick="buyTicket(${r.id})">🎫 Купити</button></td>
                </tr>
            `).join('');
            
            document.getElementById("totalCount").innerText = routes.length;
        }

        // ========== ПОШУК МАРШРУТІВ ==========
        window.searchRoutes = function() {
            const from = document.getElementById("searchFrom")?.value.toLowerCase().trim();
            const to = document.getElementById("searchTo")?.value.toLowerCase().trim();
            const resultsDiv = document.getElementById("searchResults");
            const table = document.getElementById("routesTable");
            
            if(!from && !to) {
                resultsDiv.innerHTML = '';
                table.style.display = 'table';
                showAllRoutes();
                return;
            }
            
            let found = routes;
            if(from) found = found.filter(r => r.from.toLowerCase().includes(from));
            if(to) found = found.filter(r => r.to.toLowerCase().includes(to));
            
            if(found.length === 0) {
                resultsDiv.innerHTML = '<div class="route-card" style="text-align: center;"><p>❌ Маршрутів не знайдено</p><p>Спробуйте змінити параметри пошуку</p></div>';
                table.style.display = 'none';
            } else {
                resultsDiv.innerHTML = `
                    <h3>🔍 Знайдено ${found.length} маршрут(ів):</h3>
                    ${found.map(r => `
                        <div class="route-card">
                            <strong>${r.from} → ${r.to}</strong><br>
                            🕐 ${r.time} | 💰 ${r.price} грн | ⏱ ${r.duration || '3 год'} | 📏 ${r.distance || '---'}<br>
                            <button onclick="buyTicket(${r.id})">🎫 Купити квиток</button>
                        </div>
                    `).join('')}
                `;
                table.style.display = 'none';
            }
        };

        // ========== ОЧИСТИТИ ПОШУК ==========
        window.clearSearch = function() {
            document.getElementById("searchFrom").value = '';
            document.getElementById("searchTo").value = '';
            document.getElementById("searchResults").innerHTML = '';
            document.getElementById("routesTable").style.display = 'table';
            showAllRoutes();
        };

        // ========== ПОКУПКА КВИТКА ==========
        window.buyTicket = function(routeId) {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if(!user) {
                Swal.fire({
                    title: 'Потрібно увійти',
                    text: 'Перейти на сторінку входу?',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'Так, увійти',
                    cancelButtonText: 'Скасувати'
                }).then(result => {
                    if(result.isConfirmed) window.location.href = 'login.html';
                });
                return;
            }
            
            const route = routes.find(r => r.id === routeId);
            if(!route) return;
            
            Swal.fire({
                title: `Квиток ${route.from} → ${route.to}`,
                text: `Ціна: ${route.price} грн\nВведіть номер місця (1-32)`,
                input: 'number',
                inputPlaceholder: 'Номер місця',
                showCancelButton: true,
                confirmButtonText: 'Продовжити'
            }).then(seatResult => {
                if(seatResult.isConfirmed && seatResult.value >= 1 && seatResult.value <= 32) {
                    Swal.fire({
                        title: 'Оплата',
                        text: `Сума: ${route.price} грн\nВведіть 16 цифр картки`,
                        input: 'text',
                        inputPlaceholder: '1234 5678 9012 3456',
                        showCancelButton: true,
                        confirmButtonText: 'Сплатити'
                    }).then(payResult => {
                        if(payResult.isConfirmed && payResult.value && payResult.value.replace(/\s/g, '').length >= 16) {
                            const ticket = {
                                id: Date.now(),
                                from: route.from,
                                to: route.to,
                                time: route.time,
                                price: route.price,
                                date: new Date().toLocaleDateString(),
                                seat: seatResult.value,
                                duration: route.duration
                            };
                            
                            user.tickets = user.tickets || [];
                            user.tickets.push(ticket);
                            
                            const users = JSON.parse(localStorage.getItem('railway_users') || '[]');
                            const idx = users.findIndex(u => u.id === user.id);
                            if(idx !== -1) users[idx] = user;
                            localStorage.setItem('railway_users', JSON.stringify(users));
                            localStorage.setItem('current_user', JSON.stringify(user));
                            
                            // Статистика продажів
                            let stats = JSON.parse(localStorage.getItem('ticket_stats') || '[]');
                            stats.push({ routeId, from: route.from, to: route.to, price: route.price, date: new Date().toLocaleDateString() });
                            localStorage.setItem('ticket_stats', JSON.stringify(stats));
                            
                            Swal.fire('✅ Успіх!', `Квиток куплено!\n${route.from} → ${route.to}\nМісце: ${seatResult.value}\nСума: ${route.price} грн`, 'success');
                        } else if(payResult.isConfirmed) {
                            Swal.fire('❌ Помилка', 'Невірний номер картки', 'error');
                        }
                    });
                } else if(seatResult.isConfirmed) {
                    Swal.fire('❌ Помилка', 'Виберіть місце від 1 до 32', 'error');
                }
            });
        };

        // ========== ТЕМНА ТЕМА ==========
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        // Завантаження збереженої теми
        if(localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
        
        // ========== ІНІЦІАЛІЗАЦІЯ ==========
        loadRoutes();
        showAllRoutes();
    </script>
