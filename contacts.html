<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { validateContactRequest } from './js/validation.js';
        import { showErrors, showFormStatus, getFormData, clearForm } from './js/ui/forms.js';
        import { addContactRequest } from './js/services/storage.js';
        import { getCurrentUser } from './js/services/auth.js';

        const form = document.getElementById('contactForm');
        const statusEl = document.getElementById('formStatus');

        // Автозаповнення для авторизованих користувачів
        const user = getCurrentUser();
        if (user) {
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            if (nameInput && !nameInput.value) nameInput.value = user.name;
            if (emailInput && !emailInput.value) emailInput.value = user.email;
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const payload = getFormData(form);
            const { isValid, errors } = validateContactRequest(payload);
            showErrors(form, errors);
            
            if (!isValid) return;
            
            addContactRequest(payload);
            clearForm(form);
            showFormStatus(statusEl, '✅ Дякуємо! Ваше повідомлення надіслано.', false);
        });
    </script>
</head>
<body>
    <header>
        <h1>📞 Контакти</h1>
        <nav>
            <a href="index.html">🏠 Головна</a>
            <a href="news.html">📰 Новини</a>
            <a href="schedule.html">📅 Розклад</a>
            <a href="map.html">🗺 Карта</a>
            <a href="contacts.html">📞 Контакти</a>
            <a href="login.html">🔐 Вхід</a>
            <a href="register.html">📝 Реєстрація</a>
            <a href="profile.html">👤 Кабінет</a>
            <a href="admin.html">⚙ Адмін</a>
        </nav>
    </header>
    <main>
        <div class="form-container">
            <h2>📞 Зв'язатися з нами</h2>
            <p>📞 Телефон: <strong>0-800-123-456</strong></p>
            <p>📧 Email: <strong>support@railway.ua</strong></p>
            <p>📍 Адреса: <strong>м. Київ, Вокзальна площа, 1</strong></p>
            
            <h3>📝 Написати повідомлення</h3>
            <form id="contactForm">
                <div>
                    <input type="text" id="name" name="name" placeholder="Ваше ім'я" style="width:100%; padding:10px; margin:10px 0">
                    <div class="field-error" data-error="name" hidden></div>
                </div>
                <div>
                    <input type="email" id="email" name="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0">
                    <div class="field-error" data-error="email" hidden></div>
                </div>
                <div>
                    <input type="text" id="subject" name="subject" placeholder="Тема" style="width:100%; padding:10px; margin:10px 0">
                    <div class="field-error" data-error="subject" hidden></div>
                </div>
                <div>
                    <textarea id="message" name="message" rows="4" placeholder="Ваше повідомлення" style="width:100%; padding:10px; margin:10px 0"></textarea>
                    <div class="field-error" data-error="message" hidden></div>
                </div>
                <button type="submit" style="width:100%; padding:10px">📨 Надіслати</button>
                <div id="formStatus" class="status" hidden></div>
            </form>
        </div>
    </main>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    </script>
</body>
</html>
