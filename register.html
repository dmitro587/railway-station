<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { validateRegistration } from './js/validation.js';
        import { showErrors, showFormStatus } from './js/ui/forms.js';
        import { registerUser } from './js/services/auth.js';

        const form = document.getElementById('registerForm');
        const statusEl = document.getElementById('formStatus');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const payload = {
                name: form.name.value.trim(),
                email: form.email.value.trim(),
                password: form.password.value,
                confirmPassword: form.confirmPassword.value
            };
            
            const { isValid, errors } = validateRegistration(payload);
            showErrors(form, errors);
            
            if (!isValid) return;
            
            const result = registerUser(payload.name, payload.email, payload.password);
            
            if (result.success) {
                showFormStatus(statusEl, '✅ Реєстрація успішна! Перенаправлення...', false);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showFormStatus(statusEl, result.error, true);
            }
        });
    </script>
</head>
<body>
    <header>
        <h1>🚆 Реєстрація</h1>
        <nav>
            <a href="index.html">🏠 Головна</a>
            <a href="news.html">📰 Новини</a>
            <a href="schedule.html">📅 Розклад</a>
            <a href="map.html">🗺 Карта</a>
            <a href="contacts.html">📞 Контакти</a>
            <a href="login.html">🔐 Вхід</a>
            <a href="register.html">📝 Реєстрація</a>
            <a href="profile.html">👤 Кабінет</a>
            <a href="admin.html">⚙ Адмін</a>
        </nav>
    </header>
    <main>
        <div class="form-container">
            <h2>📝 Реєстрація</h2>
            <form id="registerForm">
                <div>
                    <input type="text" id="name" name="name" placeholder="Ваше ім'я" style="width:100%; padding:10px; margin:10px 0">
                    <div class="field-error" data-error="name" hidden></div>
                </div>
                <div>
                    <input type="email" id="email" name="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0">
                    <div class="field-error" data-error="email" hidden></div>
                </div>
                <div>
                    <input type="password" id="password" name="password" placeholder="Пароль" style="width:100%; padding:10px; margin:10px 0">
                    <div class="field-error" data-error="password" hidden></div>
                </div>
                <div>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Підтвердіть пароль" style="width:100%; padding:10px; margin:10px 0">
                    <div class="field-error" data-error="confirmPassword" hidden></div>
                </div>
                <button type="submit" style="width:100%; padding:10px">Зареєструватися</button>
                <div id="formStatus" class="status" hidden></div>
            </form>
            <p>Вже є акаунт? <a href="login.html">Увійти</a></p>
        </div>
    </main>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    </script>
</body>
</html>
