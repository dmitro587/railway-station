<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🚆 Реєстрація</h1>
        <nav>
            <a href="index.html">Головна</a>
            <a href="news.html">Новини</a>
            <a href="schedule.html">Розклад</a>
            <a href="contacts.html">Контакти</a>
            <a href="login.html">Вхід</a>
            <a href="register.html">Реєстрація</a>
            <a href="admin.html">Адмін</a>
        </nav>
    </header>
    <main>
        <div class="form-container">
            <h2>📝 Реєстрація</h2>
            <form id="registerForm">
                <input type="text" id="regName" placeholder="Ваше ім'я" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Пароль" required>
                <input type="password" id="regConfirm" placeholder="Підтвердіть пароль" required>
                <button type="submit">Зареєструватися</button>
            </form>
            <p>Вже є акаунт? <a href="login.html">Увійти</a></p>
        </div>
    </main>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (password !== confirm) {
                alert('❌ Паролі не співпадають');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('railway_users') || '[]');
            if (users.find(u => u.email === email)) {
                alert('❌ Користувач з таким email вже існує');
                return;
            }
            
            const newUser = { id: Date.now(), name, email, password, tickets: [] };
            users.push(newUser);
            localStorage.setItem('railway_users', JSON.stringify(users));
            localStorage.setItem('current_user', JSON.stringify(newUser));
            
            alert('✅ Реєстрація успішна!');
            window.location.href = 'profile.html';
        });
    </script>
</body>
</html>
