<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій кабінет</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <h1>👤 Мій кабінет</h1>
        <nav>
            <a href="index.html">🏠 Головна</a>
            <a href="news.html">📰 Новини</a>
            <a href="schedule.html">📅 Розклад</a>
            <a href="map.html">🗺 Карта</a>
            <a href="contacts.html">📞 Контакти</a>
            <a href="login.html">🔐 Вхід</a>
            <a href="register.html">📝 Реєстрація</a>
            <a href="profile.html">👤 Кабінет</a>
            <a href="admin.html">⚙ Адмін</a>
        </nav>
    </header>
    <main>
        <div id="profileInfo"></div>
        <h2>📋 Мої квитки</h2>
        <div id="myTickets"></div>
        <button onclick="logout()" style="background:#cc0000; padding:10px 20px; margin-top:20px">Вийти</button>
    </main>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    <script>
        function loadProfile() {
            const user = JSON.parse(localStorage.getItem('current_user'));
            if (!user) { window.location.href = 'login.html'; return; }
            document.getElementById('profileInfo').innerHTML = `<div class="route-card"><h3>Вітаємо, ${user.name}!</h3><p>📧 ${user.email}</p><p>🆔 ID: ${user.id}</p><p>🎫 Всього квитків: ${user.tickets?.length || 0}</p></div>`;
            const ticketsDiv = document.getElementById('myTickets');
            if (user.tickets && user.tickets.length > 0) {
                ticketsDiv.innerHTML = user.tickets.map((t, idx) => `
                    <div class="route-card" id="ticket-${t.id}">
                        <strong>${t.from} → ${t.to}</strong><br>
                        📅 ${t.date} | 🕐 ${t.time} | 💺 Місце: ${t.seat || 'не вибрано'}<br>
                        💰 ${t.price} грн | ⏱ ${t.duration || '3 год'}<br>
                        <div id="qrcode-${t.id}"></div>
                        <button onclick="downloadTicketPDF(${t.id})">📄 Скачати PDF</button>
                    </div>
                `).join('');
                user.tickets.forEach(t => {
                    new QRCode(document.getElementById(`qrcode-${t.id}`), {
                        text: `КВИТОК: ${t.from}→${t.to} ${t.date} ${t.time} Місце:${t.seat || '?'} Ціна:${t.price}грн`,
                        width: 120, height: 120
                    });
                });
            } else {
                ticketsDiv.innerHTML = '<p>У вас ще немає квитків. Перейдіть до <a href="schedule.html">розкладу</a>, щоб купити.</p>';
            }
        }
        
        function downloadTicketPDF(ticketId) {
            const user = JSON.parse(localStorage.getItem('current_user'));
            const ticket = user.tickets.find(t => t.id === ticketId);
            if(ticket) {
                Swal.fire({ title: '📄 Квиток', html: `<div style="text-align:center"><strong>${ticket.from} → ${ticket.to}</strong><br>Дата: ${ticket.date}<br>Час: ${ticket.time}<br>Місце: ${ticket.seat}<br>Ціна: ${ticket.price} грн</div>`, confirmButtonText: 'OK' });
            }
        }
        
        function logout() { localStorage.removeItem('current_user'); window.location.href = 'index.html'; }
        function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        loadProfile();
    </script>
</body>
</html>
